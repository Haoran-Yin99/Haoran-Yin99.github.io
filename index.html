<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- v20260616-2: synced from index2.html -->
  <title>Haoran Yin | Academic Homepage</title>
  <meta name="description" content="Haoran Yin's academic homepage - AFDM, ISAC, wireless communications" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:    #2c5f8a;
      --accent-lt: #e8f1f8;
      --text:      #24292e;
      --text-muted:#586069;
      --border:    #e1e4e8;
      --bg:        #ffffff;
      --sidebar-w: 280px;
      --tag-journal:    #1a7f37;
      --tag-conference: #9a6700;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      background: #f6f8fa;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Language Toggle (embedded in topnav) ─── */
    .lang-btn {
      padding: 4px 12px; border-radius: 16px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all .2s; background: transparent; color: var(--text-muted);
    }
    .lang-btn.active {
      background: var(--accent); color: #fff;
    }
    .lang-btn:hover:not(.active) { background: var(--accent-lt); color: var(--accent); }

    /* ─── Layout ─── */
    #app { display: flex; max-width: 1160px; margin: 0 auto; padding: 24px 16px; gap: 28px; align-items: flex-start; }

    /* ─── Sidebar ─── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: 24px;
    }
    .sidebar-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 20px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .avatar-wrap {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 14px;
      border: 3px solid var(--border);
    }
    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .sidebar-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .sidebar-name-zh {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .sidebar-title {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .sidebar-links { display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-muted);
      padding: 2px 0;
    }
    .sidebar-link i { width: 16px; color: var(--accent); font-size: 14px; }
    .sidebar-link a { color: var(--text-muted); }
    .sidebar-link a:hover { color: var(--accent); }
    .sidebar-icons { display: flex; justify-content: center; gap: 12px; margin-top: 14px; }
    .sidebar-icons a {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent-lt); color: var(--accent);
      font-size: 15px; transition: background .2s, color .2s;
    }
    .sidebar-icons a:hover { background: var(--accent); color: #fff; text-decoration: none; }

    /* ─── Top Navigation Bar (desktop + mobile) ─── */
    #topnav {
      display: flex;
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 24px;
      gap: 0; font-size: 13px; overflow-x: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    #topnav a {
      color: var(--text-muted); white-space: nowrap; font-weight: 500;
      padding: 12px 14px; display: block;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    #topnav a:hover, #topnav a.active {
      color: var(--accent); border-bottom-color: var(--accent);
      text-decoration: none;
    }

    /* ─── Main content ─── */
    #main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 24px; }

    /* ─── Section card ─── */
    .section-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 30px;
      box-shadow: var(--shadow);
      scroll-margin-top: 56px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent-lt);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .emoji { font-size: 20px; }

    /* ─── About ─── */
    .about-bio { font-size: 14.5px; color: var(--text); line-height: 1.8; }
    .about-bio p + p { margin-top: 10px; }
    .scholar-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 6px 12px;
      background: var(--accent-lt); border-radius: 20px;
      font-size: 13px; color: var(--accent); font-weight: 500;
    }
    .scholar-badge:hover { background: var(--accent); color: #fff; text-decoration: none; }

    /* ─── Education timeline ─── */
    .edu-timeline { display: flex; flex-direction: column; gap: 0; }
    .edu-item {
      display: flex; gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .edu-item:last-child { border-bottom: none; }
    .edu-dot-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding-top: 4px; flex-shrink: 0;
    }
    .edu-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); border: 2px solid var(--accent-lt);
    }
    .edu-line { width: 2px; background: var(--border); flex: 1; min-height: 40px; }
    .edu-item:last-child .edu-line { display: none; }
    .edu-body { flex: 1; }
    .edu-degree { font-size: 14px; font-weight: 700; color: var(--text); }
    .edu-uni { font-size: 13px; color: var(--accent); font-weight: 500; }
    .edu-period { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .edu-meta { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }
    .edu-meta span { display: block; }

    /* ─── News ─── */
    .news-list { display: flex; flex-direction: column; gap: 0; }
    .news-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .news-item:last-child { border-bottom: none; }
    .news-date {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      min-width: 60px; padding-top: 2px; font-variant-numeric: tabular-nums;
    }
    .news-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      margin-top: 7px;
    }
    .news-dot.paper  { background: #0969da; }
    .news-dot.award  { background: #e6a817; }
    .news-dot.career { background: #1a7f37; }
    .news-dot.talk   { background: #8250df; }
    .news-content { font-size: 13.5px; color: var(--text); flex: 1; }

    /* ─── Publications ─── */
    .pub-filter { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .pub-filter-btn {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg); cursor: pointer;
      color: var(--text-muted); transition: all .2s;
    }
    .pub-filter-btn.active, .pub-filter-btn:hover {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    /* Featured paper card */
    .pub-featured {
      display: flex; gap: 18px;
      background: var(--accent-lt);
      border: 1px solid #c4d9ec;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .pub-featured-badge {
      flex-shrink: 0; width: 3px; background: var(--accent); border-radius: 2px;
    }
    .pub-featured-body { flex: 1; min-width: 0; }
    /* Normal pub row */
    .pub-list { display: flex; flex-direction: column; gap: 0; }
    .pub-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .pub-item:last-child { border-bottom: none; }
    .pub-year-badge {
      font-size: 11px; font-weight: 700; color: #fff;
      background: var(--accent); padding: 2px 7px; border-radius: 4px;
      flex-shrink: 0; margin-top: 3px; height: fit-content;
    }
    .pub-abbr-badge {
      display: inline-block;
      font-size: 10.5px; font-weight: 600; color: #555;
      background: #eef2f7; padding: 1px 6px; border-radius: 3px;
      margin-right: 4px; vertical-align: middle;
    }
    .pub-body { flex: 1; min-width: 0; }
    .pub-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; }
    .pub-authors { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .pub-authors strong { color: var(--text); }
    .pub-venue { font-size: 12.5px; margin-top: 4px; font-style: italic; color: var(--text-muted); }
    .pub-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .tag {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px;
    }
    .tag-journal    { background: #d1fae5; color: var(--tag-journal); }
    .tag-conference { background: #fef3c7; color: var(--tag-conference); }
    .tag-hot        { background: #fee2e2; color: #b91c1c; }
    .tag-award      { background: #ede9fe; color: #6d28d9; }
    .tag-if         { background: #f0f9ff; color: #0369a1; }
    .tag-book       { background: #fdf4ff; color: #86198f; }

    /* ─── Research ─── */
    .research-summary {
      font-size: 14px; color: var(--text-muted); line-height: 1.8;
      margin-bottom: 18px; padding: 12px 16px;
      background: var(--accent-lt); border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
    }
    .research-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .research-card {
      background: #f6f8fa; border: 1px solid var(--border);
      border-radius: 8px; padding: 16px;
    }
    .research-card-title {
      font-size: 13.5px; font-weight: 700; color: var(--accent); margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .research-card-title .ri { font-size: 16px; }
    .research-card-body { font-size: 12.5px; color: var(--text-muted); line-height: 1.7; }

    /* ─── Academic Service ─── */
    .service-section { margin-bottom: 20px; }
    .service-section:last-child { margin-bottom: 0; }
    .service-subtitle {
      font-size: 13.5px; font-weight: 700; color: var(--text);
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 7px;
    }
    .service-subtitle i { color: var(--accent); }
    .service-list { display: flex; flex-direction: column; gap: 8px; padding-left: 2px; }
    .service-item {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13.5px; color: var(--text); line-height: 1.6;
    }
    .service-item::before {
      content: ""; display: block;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 8px;
    }
    .service-journal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; padding-left: 16px; }
    .service-journal-tag {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px;
      background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd;
    }
    .service-stats {
      display: flex; flex-wrap: wrap; gap: 12px;
      padding: 14px 16px; background: var(--accent-lt);
      border-radius: 8px; margin-bottom: 18px;
    }
    .service-stat {
      display: flex; flex-direction: column; align-items: center;
      padding: 0 16px; border-right: 1px solid var(--border);
    }
    .service-stat:last-child { border-right: none; }
    .service-stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
    .service-stat-label { font-size: 11px; color: var(--text-muted); text-align: center; }

    /* ─── Projects ─── */
    .project-list { display: flex; flex-direction: column; gap: 14px; }
    .project-card {
      border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px;
      background: var(--bg);
    }
    .project-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .project-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.5; }
    .project-status {
      font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px;
      flex-shrink: 0; height: fit-content;
    }
    .status-active   { background: #d1fae5; color: #065f46; }
    .status-done     { background: #f3f4f6; color: #6b7280; }
    .project-meta    { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 14px; }
    .project-meta span { display: flex; align-items: center; gap: 5px; }
    .project-desc    { font-size: 13px; color: var(--text-muted); margin-top: 8px; line-height: 1.7; }

    /* ─── Honors ─── */
    .honors-list { display: flex; flex-direction: column; gap: 0; }
    .honor-item {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .honor-item:last-child { border-bottom: none; }
    .honor-year {
      font-size: 12px; font-weight: 700; color: #fff;
      background: #e6a817; padding: 2px 8px; border-radius: 4px;
      flex-shrink: 0; margin-top: 3px; height: fit-content;
    }
    .honor-body { flex: 1; }
    .honor-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; }
    .honor-detail { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }

    /* ─── Talks ─── */
    .talks-list { display: flex; flex-direction: column; gap: 0; }
    .talk-item {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .talk-item:last-child { border-bottom: none; }
    .talk-year {
      font-size: 12px; font-weight: 700; color: #fff;
      background: #8250df; padding: 2px 8px; border-radius: 4px;
      flex-shrink: 0; margin-top: 3px; height: fit-content; white-space: nowrap;
    }
    .talk-body { flex: 1; }
    .talk-venue { font-size: 14px; font-weight: 600; color: var(--accent); }
    .talk-title { font-size: 13px; color: var(--text-muted); margin-top: 3px; line-height: 1.6; }

    /* ─── Footer ─── */
    footer {
      margin-top: 8px; padding: 20px 0 10px;
      font-size: 12px; color: var(--text-muted); text-align: center;
    }
    footer a { color: var(--text-muted); }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #sidebar { width: 100%; position: static; }
      .sidebar-card { display: flex; gap: 20px; text-align: left; align-items: center; }
      .avatar-wrap { width: 80px; height: 80px; flex-shrink: 0; margin: 0; }
      .sidebar-icons { justify-content: flex-start; }
      .research-grid { grid-template-columns: 1fr; }
      #lang-toggle { top: auto; bottom: 20px; right: 16px; }
      #topnav { padding: 0 12px; gap: 0; }
      #topnav a { padding: 10px 10px; font-size: 12px; }
    }
  </style>
</head>

// ══════════════════════════════════════════════════════════════════════════════
// Load data2.json, fallback to embedded data on error (e.g. file:// protocol)
// ══════════════════════════════════════════════════════════════════════════════
async function loadData() {
  try {
    const res = await fetch('data2.json?v=4');
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    I18N = json.i18n;
    DATA = json;
  } catch(e) {
    // fallback: use embedded data (works when opened via file://)
    I18N = FALLBACK.i18n;
    DATA = FALLBACK.data;
  }
  LANG = localStorage.getItem('acad2_lang') || 'en';
  applyI18n();
  renderAll();
  document.getElementById('btn-en').classList.toggle('active', LANG==='en');
  document.getElementById('btn-zh').classList.toggle('active', LANG==='zh');
}

// ══════════════════════════════════════════════════════════════════════════════
// Language engine
// ══════════════════════════════════════════════════════════════════════════════
let LANG = 'en';

function setLang(l) {
  LANG = l;
  localStorage.setItem('acad2_lang', l);
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('btn-zh').classList.toggle('active', l==='zh');
  applyI18n();
  renderAll();
}

function t(obj) {
  if (typeof obj === 'string') return obj;
  return (obj && obj[LANG]) ? obj[LANG] : (obj && obj.en) ? obj.en : '';
}

function applyI18n() {
  const strings = I18N[LANG];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key] !== undefined) {
      // sidebar_title has newlines → convert to <br>
      el.innerHTML = strings[key].replace(/\n/g,'<br>');
    }
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// Renderers
// ══════════════════════════════════════════════════════════════════════════════
function renderAbout() {
  document.getElementById('about-bio').innerHTML = t(DATA.about);
}

function renderEdu() {
  const el = document.getElementById('edu-timeline');
  el.innerHTML = DATA.education.map(e => `
    <div class="edu-item">
      <div class="edu-dot-wrap">
        <div class="edu-dot"></div>
        <div class="edu-line"></div>
      </div>
      <div class="edu-body">
        <div class="edu-degree">${t(e.degree)} — ${t(e.major)}</div>
        <div class="edu-uni">${t(e.uni)}</div>
        <div class="edu-period">${e.period} &nbsp;·&nbsp; ${t(e.location)}</div>
        <div class="edu-meta">
          ${e.advisor ? `<span>${LANG==='zh'?'导师：':'Advisor: '}${t(e.advisor)}</span>` : ''}
          ${e.thesis ? `<div class="edu-thesis">${LANG==='zh'?'博士论文：':'Doctoral Thesis: '}${t(e.thesis)}</div>` : ''}
        </div>
      </div>
    </div>`).join('');
}

function renderNews() {
  const el = document.getElementById('news-list');
  el.innerHTML = DATA.news.map(n => `
    <div class="news-item">
      <span class="news-date">${n.date}</span>
      <span class="news-dot ${n.type}"></span>
      <span class="news-content">${t(n)}</span>
    </div>`).join('');
}

let currentFilter = 'all';
function filterPub(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.pub-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPubs();
}

function tagClass(t2) {
  if (t2 === 'Journal' || t2 === '期刊') return 'tag tag-journal';
  if (t2 === 'Conference' || t2 === '会议') return 'tag tag-conference';
  if (t2.includes('Book') || t2.includes('专著') || t2 === 'Springer' || t2 === 'PHEI' || t2 === '电子工业出版社') return 'tag tag-book';
  if (t2.includes('IF'))   return 'tag tag-if';
  if (t2.includes('\uD83D\uDD25') || t2.includes('Hot') || t2.includes('热点')) return 'tag tag-hot';
  if (t2.includes('\uD83C\uDFC5') || t2.includes('Award') || t2.includes('Best') || t2.includes('优秀')) return 'tag tag-award';
  return 'tag tag-if';
}

function renderPubs() {
  const el = document.getElementById('pub-list');
  const filtered = DATA.publications.filter(p => currentFilter === 'all' || p.type === currentFilter);
  el.innerHTML = filtered.map(p => {
    const tags = t(p.tags).map(tg => `<span class="${tagClass(tg)}">${tg}</span>`).join('');
    const link = p.link || '';
    const titleHtml = link
      ? `<a href="${link}" target="_blank" rel="noopener">${t(p.title)} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;opacity:0.6"></i></a>`
      : t(p.title);
    const abbrHtml = p.abbr ? `<span class="pub-abbr-badge">${p.abbr}</span> ` : '';
    if (p.featured) {
      return `
        <div class="pub-featured" data-type="${p.type}">
          <div class="pub-featured-badge"></div>
          <div class="pub-featured-body">
            <div class="pub-title">${abbrHtml}${titleHtml}</div>
            <div class="pub-authors">${p.authors}</div>
            <div class="pub-venue">${t(p.venue)}, ${p.year}</div>
            <div class="pub-tags">${tags}</div>
          </div>
        </div>`;
    }
    return `
      <div class="pub-item" data-type="${p.type}">
        <span class="pub-year-badge">${p.year}</span>
        <div class="pub-body">
          <div class="pub-title">${abbrHtml}${titleHtml}</div>
          <div class="pub-authors">${p.authors}</div>
          <div class="pub-venue">${t(p.venue)}</div>
          <div class="pub-tags">${tags}</div>
        </div>
      </div>`;
  }).join('');
}

function renderResearch() {
  document.getElementById('research-summary').innerHTML = t(DATA.research.summary);
  const el = document.getElementById('research-grid');
  el.innerHTML = DATA.research.items.map(r => `
    <div class="research-card">
      <div class="research-card-title"><span class="ri">${r.icon}</span>${t(r.title)}</div>
      <div class="research-card-body">${t(r.body)}</div>
    </div>`).join('');
}

function renderService() {
  const el = document.getElementById('service-content');
  const stats = DATA.service.stats[LANG];

  const statsHtml = `
    <div class="service-stats">
      ${stats.map(s=>`
        <div class="service-stat">
          <div class="service-stat-num">${s.num}</div>
          <div class="service-stat-label">${s.label}</div>
        </div>`).join('')}
    </div>`;

  const roleIcons = { chair:"🏛️", reviewer:"📋", talk:"🎤" };
  const roleTitles = {
    en:{ chair:"Session Chair", reviewer:"", talk:"Invited Talks & Presentations" },
    zh:{ chair:"分会主席", reviewer:"", talk:"邀请报告与现场汇报" }
  };

  const rolesHtml = DATA.service.roles.map(r => {
    if (r.type === 'reviewer') {
      const tags = r.journals.map(j=>`<span class="service-journal-tag">${j}</span>`).join('');
      return `
        <div class="service-section">
          <div class="service-subtitle"><i class="fa-solid fa-file-pen"></i> ${t(r.label)}</div>
          <div class="service-journal-tags">${tags}</div>
        </div>`;
    }
    const icon = roleIcons[r.type] || '•';
    const title = roleTitles[LANG][r.type] || '';
    const items = (r.items[LANG] || r.items).map(it=>`<div class="service-item">${it}</div>`).join('');
    return `
      <div class="service-section">
        <div class="service-subtitle">${icon} ${title}</div>
        <div class="service-list">${items}</div>
      </div>`;
  }).join('');

  el.innerHTML = statsHtml + rolesHtml;
}

function renderProjects() {
  const el = document.getElementById('project-list');
  el.innerHTML = DATA.projects.map(p => `
    <div class="project-card">
      <div class="project-top">
        <div class="project-title">${t(p.title)}</div>
        <span class="project-status ${p.status==='active'?'status-active':'status-done'}">
          ${p.status==='active' ? (LANG==='zh'?'进行中':'Active') : (LANG==='zh'?'已结项':'Completed')}
        </span>
      </div>
      <div class="project-meta">
        <span><i class="fa-solid fa-coins" style="color:#e6a817"></i> ${t(p.funding)}${p.amount?' · '+p.amount:''}</span>
        <span><i class="fa-solid fa-calendar" style="color:#6b7280"></i> ${p.period}</span>
        <span><i class="fa-solid fa-user" style="color:#6b7280"></i> ${t(p.role)}</span>
      </div>
      <div class="project-desc">${t(p.desc)}</div>
    </div>`).join('');
}

function renderHonors() {
  const el = document.getElementById('honors-list');
  const items = DATA.honors ? DATA.honors[LANG] : [];
  el.innerHTML = items.map(h => `
    <div class="honor-item">
      <span class="honor-year">${h.year}</span>
      <div class="honor-body">
        <div class="honor-title">${h.title}</div>
        <div class="honor-detail">${h.detail}</div>
      </div>
    </div>`).join('');
}

function renderTalks() {
  const el = document.getElementById('talks-list');
  const items = DATA.talks ? DATA.talks[LANG] : [];
  el.innerHTML = items.map(tk => `
    <div class="talk-item">
      <span class="talk-year">${tk.year}</span>
      <div class="talk-body">
        <div class="talk-venue">${tk.venue}</div>
        <div class="talk-title">${tk.title}</div>
      </div>
    </div>`).join('');
}

function renderAll() {
  renderAbout();
  renderEdu();
  renderNews();
  renderHonors();
  renderResearch();
  renderPubs();
  renderService();
  renderTalks();
  renderProjects();
}
